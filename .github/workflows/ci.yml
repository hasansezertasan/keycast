---
name: CI
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  hooks:
    name: Run prek hooks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: ".python-version"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - run: uv run --locked prek run --all-files --show-diff-on-failure
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Run Tests on ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - name: System Info
        shell: bash
        run: |
          if [[ ${{ matrix.os }} == "ubuntu-latest" ]]; then
              echo "The system is Linux."
              uname -a || true
              lsb_release -a || true
              gcc --version || true
          elif [[ ${{ matrix.os }} == "macos-latest" ]]; then
              echo "The system is macOS."
              sw_vers || true
              uname -a || true
              gcc --version || true
          elif [[ ${{ matrix.os }} == "windows-latest" ]]; then
              echo "The system is Windows (using a Unix-like environment)."
              systeminfo || true
          else
              echo "Unknown OS: $OS_TYPE"
              exit 1
          fi
      - name: Environment Info
        run: |
          env || true
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: ".python-version"
      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Restore cache
        if: steps.setup-uv.outputs.cache-hit == 'true'
        run: echo "Cache was restored"
      - name: Install headless X server (Linux)
        # pynput imports its Xlib backend at import time; without a display the
        # test/lint collection fails before anything runs. Xvfb provides one.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Run the tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a uv run --locked tox run
          else
            uv run --locked tox run
          fi
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
  build-macos:
    # Build-only regression guard + preview: bundle keycast into a .app on every
    # PR/push so a dependency or Python bump that breaks PyInstaller bundling fails
    # HERE, against the offending diff, instead of during a release. The test suite
    # runs against the source tree and never against the frozen bundle, so this is
    # the only check that exercises packaging. The .app is wrapped in a .dmg and
    # uploaded as an unsigned, version-0.0.0 preview artifact (7-day retention) so a
    # reviewer can launch-test the overlay on a real Mac — the live path CI cannot
    # exercise. The .dmg wrapper is load-bearing: actions/upload-artifact re-zips
    # its input and drops the POSIX exec bit + symlinks a .app relies on, so a raw
    # .app would download "damaged"; the .dmg carries its own filesystem and
    # survives intact (same reason release.yml ships a .dmg). It is NOT the release
    # artifact; release.yml produces that.
    name: Build macOS app (check)
    # Deliberately PINNED to match release.yml's build-macos (NOT `macos-latest`):
    # the build runner sets the bundle's minimum-macOS floor, so the PR check must
    # exercise the same OS the release artifact is built on, not silently follow the
    # `macos-latest` -> macOS 26 migration (runner-images#14167). The test matrix
    # above intentionally stays on `macos-latest`.
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        # No fetch-depth: 0 — hatch-vcs falls back to 0.0.0 on a shallow checkout
        # (fallback-version in pyproject), which is fine for a build-only check.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          # cache-python: enable-cache only caches the uv package cache, NOT the
          # managed interpreter (a separate dir). Without this the ~30MB Astral
          # CPython below is re-downloaded every run.
          cache-python: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install Astral CPython 3.14.6
        # Pinned to a verified-good Astral build (see release.yml / ADR-001);
        # bump deliberately. 3.14.3 ships broken Tk.
        run: uv python install 3.14.6
      - name: Build the .app with PyInstaller
        run: |
          uv venv --python 3.14.6 .venv-pkg
          uv pip install --python .venv-pkg/bin/python . pyinstaller==6.16.0
          .venv-pkg/bin/pyinstaller --noconfirm packaging/keycast.spec
      - name: Verify the bundle is well-formed and contains Tk
        # Cheapest assertion that catches the silent "no Tk" failure without
        # launching a GUI: the bundle must have the launcher and the _tkinter
        # extension. A Tk-less bundle builds clean but crashes on a user's Mac.
        run: |
          test -x dist/keycast.app/Contents/MacOS/keycast
          find dist/keycast.app -name '_tkinter*.so' | grep -q . \
            || { echo "::error::_tkinter missing from the bundle"; exit 1; }
      - name: Package the .app into a .dmg
        # Wrap before upload so the bundle survives artifact zipping intact (see the
        # job comment) — mirrors release.yml's macOS packaging step.
        run: |
          hdiutil create -volname keycast \
            -srcfolder dist/keycast.app -ov -format UDZO keycast.dmg
      - name: Upload the .dmg as a preview build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: keycast-macos-preview
          path: keycast.dmg
          retention-days: 7
  build-windows:
    # Windows counterpart of build-macos: a build-only guard + preview for the
    # bundle that is otherwise unverified locally. Same single spec — PyInstaller's
    # macOS BUNDLE is a no-op off macOS, so the build yields dist/keycast/
    # (keycast.exe + deps). Uploads an unsigned, version-0.0.0 preview (7-day
    # retention); the release artifact comes from release.yml.
    name: Build Windows app (check)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          # NB: no cache-python on Windows. uv creates a minor-version *junction*
          # (cpython-3.14-windows-... -> the patch dir) that GitHub's tar-based
          # cache cannot round-trip; a restored cache leaves a broken reparse point
          # and `uv python install` then fails with "directory name is invalid"
          # (os error 267). Re-downloading the ~30MB interpreter is the reliable
          # trade. macOS caches it fine (tar preserves symlinks there).
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install Astral CPython 3.14.6
        run: uv python install 3.14.6
      - name: Build the .exe with PyInstaller
        shell: pwsh
        run: |
          uv venv --python 3.14.6 .venv-pkg
          uv pip install --python .venv-pkg/Scripts/python.exe . pyinstaller==6.16.0
          .venv-pkg/Scripts/pyinstaller.exe --noconfirm packaging/keycast.spec
      - name: Verify the bundle is well-formed and contains Tk
        # Windows analogue of the macOS check: the folder must have the launcher
        # and the _tkinter extension (a .pyd on Windows). A Tk-less bundle builds
        # clean but crashes on launch.
        shell: pwsh
        run: |
          if (-not (Test-Path dist/keycast/keycast.exe)) {
            Write-Host "::error::keycast.exe missing from the bundle"; exit 1
          }
          if (-not (Get-ChildItem -Recurse dist/keycast -Filter '_tkinter*.pyd' -ErrorAction SilentlyContinue)) {
            Write-Host "::error::_tkinter missing from the bundle"; exit 1
          }
      - name: Compile the installer (Inno Setup)
        shell: pwsh
        # A broken keycast.iss would block the atomic release (release.yml's
        # publish-pypi needs build-windows), so compile it here on every PR.
        # iscc.exe ships in the windows-latest runner image (InnoSetup, verify on
        # the runner-image readme); if a future image drops it, add an install
        # step. No version flag here, so the script's 0.0.0 default is used.
        # Assert the installer actually emerged.
        run: |
          iscc packaging/keycast.iss
          if (-not (Test-Path packaging/keycast-setup.exe)) {
            Write-Host "::error::keycast-setup.exe missing after iscc"; exit 1
          }
      - name: Pack the MSIX (Microsoft Store)
        shell: pwsh
        # A broken AppxManifest.xml would block the atomic release exactly like
        # a broken keycast.iss, so pack it here on every PR with the template's
        # 0.0.0.0 default version (ADR-009). No -Version -> the manifest is
        # packed verbatim. Shared with release.yml via pack.ps1 so the makeappx
        # resolution and layout staging can't drift between the two.
        run: ./packaging/msix/pack.ps1
      - name: Upload the folder and installer as a preview build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: keycast-windows-preview
          path: |
            dist/keycast
            packaging/keycast-setup.exe
          retention-days: 7
