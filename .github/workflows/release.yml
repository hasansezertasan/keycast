---
name: Release
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions: {}
jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
      # Prerelease detection (beta channel, see release-please-config.json's
      # prerelease/versioning settings). release-please tags prereleases in
      # SemVer form -- `v0.2.0-beta.1` -- which hatch-vcs normalizes to the PEP 440
      # `0.2.0b1`. A final/graduated tag (`v0.2.0`) never contains a hyphen, so a
      # `-` in the tag is an unambiguous prerelease marker. Downstream jobs gate on
      # this: prereleases ship to PyPI (hidden from `pip install` without `--pre`)
      # and the GitHub release, but are kept OFF the Homebrew/Scoop channels.
      is_prerelease: ${{ contains(steps.release.outputs.tag_name, '-') }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  # Three independent builders, each fed by the drafted release+tag. They are
  # pure producers: contents:read only, they never touch the release. Each uploads
  # a workflow artifact; publish-release attaches them. The release is ATOMIC --
  # publish-pypi needs ALL three, so nothing ships unless every artifact built.

  build-package:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Build sdist + wheel
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # hatch-vcs derives the version from the release tag (created eagerly by
          # release-please's force-tag-creation), so the build needs full history.
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Build the package
        run: uv build --no-sources --quiet
      - name: Upload the distribution
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-pypi
          path: dist/

  build-macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # Apple Silicon runner: Astral's standalone CPython is single-arch, so an
    # arm64 runner yields an arm64-only .app (see packaging/keycast.spec).
    # Deliberately PINNED, not `macos-latest`: the build runner sets the released
    # bundle's effective minimum-macOS floor, so it must not silently follow the
    # `macos-latest` -> macOS 26 migration (runner-images#14167). Bump this pin
    # consciously when raising the supported-OS floor.
    runs-on: macos-15
    name: Build macOS app
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # hatch-vcs needs the tag for __version__ (`uv pip install .` builds it).
          fetch-depth: 0
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          # cache-python: enable-cache only caches the uv package cache, NOT the
          # managed interpreter. Without this the ~30MB Astral CPython below is
          # re-downloaded every release run.
          cache-python: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install Astral CPython 3.14.6
        # Pinned to a verified-good Astral build (see docs/adr/001), not the
        # proven minimum: 3.14.6 ships working Tk 9.0. Astral 3.14.3 tested broken
        # (Tcl init fails) and Homebrew python@3.14 has no _tkinter, so bump this
        # deliberately — an unpinned Python could silently produce a Tk-less or
        # crashing bundle.
        run: uv python install 3.14.6
      - name: Build the .app with PyInstaller
        # pyinstaller pinned to match the types-pyinstaller dev dependency.
        run: |
          uv venv --python 3.14.6 .venv-pkg
          uv pip install --python .venv-pkg/bin/python . pyinstaller==6.16.0
          .venv-pkg/bin/pyinstaller --noconfirm packaging/keycast.spec
      - name: Package the .app into a .dmg
        # dmgbuild writes the Finder layout (.DS_Store) directly, so the
        # drag-to-Applications styling is produced headlessly — no Finder /
        # AppleScript, unlike create-dmg. Layout lives in packaging/dmg_settings.py.
        run: |
          uvx dmgbuild -s packaging/dmg_settings.py -D app=dist/keycast.app \
            keycast keycast.dmg
          echo "sha256 (for the Homebrew cask):"
          shasum -a 256 keycast.dmg
      - name: Upload the .dmg
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-macos
          path: keycast.dmg

  build-windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    # NOTE: developed on a macOS dev machine and never built locally; the Windows
    # bundle is exercised by the build-only `build-windows` check in ci.yml (green
    # since PR #3). Reuses the committed spec — PyInstaller's macOS BUNDLE step is a
    # no-op on Windows, so the spec yields the dist/keycast/ folder (keycast.exe +
    # deps), which is zipped for a direct GitHub-release download.
    runs-on: windows-latest
    name: Build Windows app
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          # NB: no cache-python on Windows. uv creates a minor-version *junction*
          # (cpython-3.14-windows-... -> the patch dir) that GitHub's tar-based
          # cache cannot round-trip; a restored cache leaves a broken reparse point
          # and `uv python install` then fails with "directory name is invalid"
          # (os error 267). Re-downloading the ~30MB interpreter is the reliable
          # trade. macOS caches it fine (tar preserves symlinks there).
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install Astral CPython 3.14.6
        run: uv python install 3.14.6
      - name: Build the .exe with PyInstaller
        shell: pwsh
        run: |
          uv venv --python 3.14.6 .venv-pkg
          uv pip install --python .venv-pkg/Scripts/python.exe . pyinstaller==6.16.0
          .venv-pkg/Scripts/pyinstaller.exe --noconfirm packaging/keycast.spec
      - name: Package the app folder into a .zip
        shell: pwsh
        run: Compress-Archive -Path dist/keycast -DestinationPath keycast-windows.zip
      - name: Build the installer (Inno Setup)
        shell: pwsh
        # iscc.exe ships in the windows-latest runner image (if a future image
        # drops InnoSetup, add an install step here). Inject the release
        # version (the tag is the single source of truth, like hatch-vcs) so the
        # installer's version matches the bundled __version__. Both
        # keycast-setup.exe and keycast-windows.zip ship as assets — the installer
        # for normal users, the zip as the portable / no-admin option.
        run: iscc /DMyAppVersion=${{ needs.release-please.outputs.version }} packaging/keycast.iss
      - name: Upload the .zip and the installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-windows
          path: |
            keycast-windows.zip
            packaging/keycast-setup.exe
      - name: Pack the MSIX (Microsoft Store submission artifact)
        # Skipped for prereleases: MSIX versions are four-part numeric with no
        # prerelease form, and the Store is a stable-only channel (ADR-007 /
        # ADR-009) — the guard is inert while the beta channel is disabled, but
        # binding if it is re-enabled.
        if: ${{ needs.release-please.outputs.is_prerelease != 'true' }}
        shell: pwsh
        # The Store signs and hosts the package (ADR-009), so keycast.msix is a
        # *workflow artifact* for Partner Center — deliberately NOT a release
        # asset: an unsigned MSIX cannot be installed, so attaching it would
        # publish a file users can't use (publish-release only collects dist-*
        # artifacts for the same reason). makeappx.exe ships in the Windows SDK
        # on the runner image but is not on PATH, so resolve it under Windows
        # Kits. The manifest's Identity Version is rewritten from the release
        # tag: vX.Y.Z -> X.Y.Z.0 (the tag exists at build time thanks to
        # release-please's force-tag-creation, same guarantee hatch-vcs relies
        # on).
        run: |
          $makeappx = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\10.*\x64\makeappx.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) { Write-Host "::error::makeappx.exe not found in the Windows SDK"; exit 1 }
          New-Item -ItemType Directory msix-layout | Out-Null
          Copy-Item -Recurse dist/keycast msix-layout/keycast
          Copy-Item -Recurse packaging/msix/Assets msix-layout/Assets
          (Get-Content packaging/msix/AppxManifest.xml) -replace 'Version="0\.0\.0\.0"', 'Version="${{ needs.release-please.outputs.version }}.0"' |
            Set-Content msix-layout/AppxManifest.xml
          & $makeappx pack /d msix-layout /p keycast.msix /o
          if (-not (Test-Path keycast.msix)) {
            Write-Host "::error::keycast.msix missing after makeappx"; exit 1
          }
      - name: Upload the MSIX (not a dist-* name — stays off the release)
        if: ${{ needs.release-please.outputs.is_prerelease != 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: keycast-msix
          path: keycast.msix

  publish-pypi:
    # Atomic gate: requires ALL builds. A failed .app/.exe build blocks the PyPI
    # release too — nothing ships unless every artifact built.
    needs: [release-please, build-package, build-macos, build-windows]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish to PyPI
    permissions:
      id-token: write # IMPORTANT: Mandatory for PyPI Trusted Publishing (OIDC)
    environment:
      name: publish
      url: https://pypi.org/project/keycast/${{ needs.release-please.outputs.version }}
    steps:
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Download the distribution
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-pypi
          path: dist
      - name: Publish to PyPI
        run: uv publish --quiet --trusted-publishing always

  publish-release:
    # Runs only after PyPI succeeds (which in turn required all builds). Collects
    # every artifact, attaches them to the release, and un-drafts it.
    needs: [release-please, publish-pypi]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish GitHub release
    permissions:
      contents: write # IMPORTANT: Mandatory to upload assets and un-draft the release
    steps:
      - name: Download the release-asset artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          # Only dist-* artifacts become release assets. The unsigned
          # keycast.msix (ADR-009) is intentionally outside the pattern: it is
          # the Partner Center submission input, and an unsigned MSIX cannot be
          # installed, so attaching it would publish a file users can't use.
          pattern: dist-*
      - name: Attach artifacts and publish the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no checkout, so gh has no git remote to infer the repo
          # from. gh reads --repo / GH_REPO (NOT GITHUB_REPOSITORY), so set it
          # explicitly or gh release upload/edit cannot resolve the repository.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          IS_PRERELEASE: ${{ needs.release-please.outputs.is_prerelease }}
        run: |
          mapfile -t files < <(find artifacts -type f)
          # Defensive: the three required builders gate this job, so files should
          # always exist — but fail loudly rather than un-draft an empty release.
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no artifacts found to attach to the release"; exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
          # Un-draft, and set the prerelease/latest flags explicitly. A beta is
          # marked --prerelease and kept OFF "Latest release" so it never displaces
          # the newest stable on the repo home; a graduated stable forces the
          # inverse (release-please flags drafts per the prerelease config, so the
          # stable branch must clear it, not assume the default).
          if [ "$IS_PRERELEASE" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease --latest=false
          else
            gh release edit "$TAG" --draft=false --prerelease=false --latest
          fi

  bump-cask:
    # Signal the Homebrew tap to bump keycast's cask for this release. The tap's
    # update-cask-dispatch.yml does the actual work (bump-cask-pr downloads the
    # published .dmg, recomputes the sha256, audits, and opens the PR) — we only
    # fire the event. This mirrors bump-scoop below: the downstream owns its own
    # update logic, we just nudge it promptly instead of waiting for its cron.
    #
    # Best-effort and OUTSIDE the atomic release gate: runs after publish-release,
    # so a tap hiccup never blocks or unwinds a shipped release. `repository_dispatch`
    # is cross-repo, which GITHUB_TOKEN cannot do, so it needs a PAT in the TAP_TOKEN
    # secret. Scope: the POST /dispatches endpoint requires Contents: write for
    # fine-grained PATs, so that stays — but Pull requests: write (needed by the old
    # direct `bump-cask-pr --no-fork`) can now be dropped, since the tap opens the PR
    # itself with its own GITHUB_TOKEN. When the secret is absent (forks, unconfigured
    # clones) the step warns and exits 0; the tap's weekly cron still catches the
    # release later, so a missed nudge is never fatal.
    needs: [release-please, publish-release]
    # Stable releases only: a beta must never reach Homebrew users (brew has no
    # `--pre` equivalent to PyPI's, so a bumped cask would push the beta to
    # everyone). Prereleases stop at PyPI + the GitHub release.
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.is_prerelease != 'true' }}
    # Linux is fine now: this only POSTs a dispatch; the bump runs on the tap.
    runs-on: ubuntu-latest
    name: Bump Homebrew cask
    permissions: {}
    steps:
      - name: Dispatch the tap update
        env:
          # gh reads GH_TOKEN for auth; the repo is given inline in the API path.
          # This is the PAT, not GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::TAP_TOKEN not set; skipping Homebrew cask bump"
            exit 0
          fi
          echo "Dispatching update-cask for keycast ${VERSION}"
          # The tap's update-cask-dispatch.yml listens for this event; `version`
          # is authoritative here (the release is freshly published), `cask`
          # scopes the bump to keycast.
          gh api repos/hasansezertasan/homebrew-tap/dispatches \
            --method POST \
            -f event_type=update-cask \
            -f 'client_payload[cask]=keycast' \
            -f "client_payload[version]=${VERSION}"

  bump-scoop:
    # Nudge the Scoop bucket to refresh keycast's manifests for this release.
    #
    # Mirrors how the Homebrew tap is fed: the package repo fires a
    # `repository_dispatch` at the bucket after publishing, and the bucket
    # re-derives each manifest's version from its OWN source — PyPI for the
    # pipx-shim manifest (`keycast-pipx`), the GitHub release for the binary-zip
    # manifest (`keycast`) — recomputes the zip hash, and opens a PR. The manifest
    # logic lives in the bucket (and runs on a cron there); this job only triggers
    # it promptly instead of waiting for that cron.
    #
    # Best-effort and OUTSIDE the atomic release gate (mirrors bump-cask): runs
    # after publish-release so the release is already un-drafted when the bucket's
    # checkver looks for it. `repository_dispatch` is cross-repo, which GITHUB_TOKEN
    # cannot do, so it needs a fine-grained PAT (Contents: write on the bucket
    # only) in BUCKET_TOKEN. Absent the secret (forks, or before the bucket
    # exists) the step warns and exits 0; the bucket's scheduled run still catches
    # the release later, so a missed nudge is never fatal.
    needs: [release-please, publish-release]
    # Stable releases only (mirrors bump-cask): Scoop has no prerelease channel,
    # so a beta would land in every bucket user's `scoop update`. Betas stop at
    # PyPI + the GitHub release.
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.release-please.outputs.is_prerelease != 'true' }}
    # Linux is fine: this only POSTs a dispatch; the bucket's update job runs in
    # the bucket repo.
    runs-on: ubuntu-latest
    name: Bump Scoop bucket
    permissions: {}
    steps:
      - name: Dispatch the bucket update
        env:
          # gh reads GH_TOKEN for auth; the repo is given inline in the API path.
          # This is the PAT, not GITHUB_TOKEN.
          GH_TOKEN: ${{ secrets.BUCKET_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::BUCKET_TOKEN not set; skipping Scoop bucket bump"
            exit 0
          fi
          echo "Dispatching update-manifest for keycast ${VERSION}"
          # The bucket's update-manifest-dispatch workflow listens for this event;
          # `version` is informational (the bucket re-checks each manifest's own
          # source), `package` scopes the bump to keycast's manifests.
          gh api repos/hasansezertasan/scoop-bucket/dispatches \
            --method POST \
            -f event_type=update-manifest \
            -f 'client_payload[package]=keycast' \
            -f "client_payload[version]=${VERSION}"

  reconcile:
    # release-please derives its commit range from the latest *published* GitHub
    # Release and ignores drafts. The release-please job above opened the next
    # release PR in this same run, while this release was still a draft, so that PR
    # was computed with no baseline and re-lists every already-shipped commit as a
    # phantom version bump. release-please will NOT clean that up on its own: when a
    # later run finds no new commits it just skips, leaving the orphan PR open. So
    # close it here now that the release is published, then re-dispatch the
    # workflow. The re-dispatch sees the published release and recreates a CORRECT
    # next PR only if real unreleased commits exist; otherwise it finds nothing and
    # stops without reaching this job again, so the re-trigger is bounded to one
    # run. (workflow_dispatch is the documented exception to GITHUB_TOKEN
    # loop-prevention, so no PAT is required.)
    needs: [release-please, publish-release]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Reconcile next release PR
    permissions:
      contents: write # IMPORTANT: Mandatory for `gh pr close --delete-branch` (deletes the ref)
      pull-requests: write # IMPORTANT: Mandatory to close the phantom release PR
      actions: write # IMPORTANT: Mandatory to re-dispatch this workflow
    steps:
      - name: Close the phantom PR and re-dispatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No checkout in this job, so gh needs the repo set explicitly
          # (gh reads GH_REPO, not GITHUB_REPOSITORY).
          GH_REPO: ${{ github.repository }}
          # Route through env and quote in-shell rather than interpolating the
          # expansion bare into the command (robust against unusual ref names).
          REF_NAME: ${{ github.ref_name }}
        run: |
          pr="$(gh pr list --state open \
            --head "release-please--branches--${REF_NAME}" \
            --json number --jq '.[0].number // empty')"
          if [ -n "$pr" ]; then
            echo "Closing phantom release PR #$pr"
            gh pr close "$pr" --delete-branch
          fi
          gh workflow run "${{ github.workflow }}" --ref "$REF_NAME"
